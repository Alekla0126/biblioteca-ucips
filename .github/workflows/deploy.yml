name: CI/CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check backend/ --select E,F,W --ignore E501

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

  deploy:
    name: Deploy to VPS
    needs: [lint-backend, lint-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/biblioteca

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Updating Firebase env..."
            sed -i "s|FIREBASE_PROJECT_ID=FILL_THIS|FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}|" .env.backend 2>/dev/null || true

            echo "==> Building and starting services..."
            docker compose -f docker-compose.yml build --no-cache
            docker compose -f docker-compose.yml up -d

            echo "==> Cleaning old images..."
            docker image prune -f

            echo "==> Health check..."
            sleep 10
            curl -sf http://localhost:8000/health && echo "Backend OK" || echo "Backend starting..."

            echo "Deployment complete at $(date)"
